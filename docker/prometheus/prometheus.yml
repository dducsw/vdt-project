global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: 'doris-fe'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['doris-fe:8030']

  - job_name: 'doris-be'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['doris-be:8040', 'doris-be-2:8040']
